version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: cryptvault_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}       
      POSTGRES_PASSWORD: ${DB_PASS}   
      POSTGRES_DB: ${DB_NAME}         
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: cryptvault_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}  
      MINIO_ROOT_PASSWORD: ${MINIO_PASS} 
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data: